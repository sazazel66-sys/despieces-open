<body>

<canvas id="c"></canvas>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

// ───────────────────────────────────────────────────────────────────────────
//  MODELO DEL MUEBLE  (cm:  X = anchura,  Y = altura,  Z = fondo)
//  pos = esquina mínima [x,y,z]   ·   size = [ancho, alto, fondo]
//  Vamos sobrescribiendo este objeto a medida que añadimos piezas.
// ───────────────────────────────────────────────────────────────────────────
// Junta de holgura de TODO frente/puerta: tras hallar su tamaño y posición, se
// descuenta de ALTO, anclando la parte baja (la cara inferior no se mueve).
const JUNTA_FRENTE = 0.2;

// Tipo de tirador a dibujar: "asa" (barra) | "unero" (perfil J a todo el ancho).
// Mutable: el botón de la UI lo alterna y reconstruye la escena.
let tipoTirador = "unero";

// Visibilidad de la(s) puerta(s)/frente(s): el botón de la UI lo alterna.
let puertaVisible = true;

// ── Perfil uñero (falsa gola de aluminio a todo el ancho del frente) ─────────
const UNERO_ALTO            = 2.7;  // alto nominal de la pala (referencia de colocación)
const UNERO_RECORTE         = 3.6;  // cuánto se baja la zona trasera del frente para la gola
const UNERO_FRENTE_DELANTE  = 0.4;  // fondo de la franja delantera del frente (cara vista)
const UNERO_FRENTE_SALIENTE = 0.5;  // cuánto sube esa franja delantera sobre la trasera
const UNERO_PALA_ALTA       = 3.5;  // alto del lado derecho de la "J" (pala, al dorso)
const UNERO_PALA_BAJA       = 0.7;  // alto del lado izquierdo de la "J" (labio, al frente)

// ── Dimensiones del módulo (cm) ──────────────────────────────────────────────
const ANCHO = 60, ALTO = 70, FONDO = 58;
const EC = 1.6;                 // espesor casco (carcasa y baldas)
const EP = 1.9;                 // espesor puerta
const TRASERA = 5;              // trasera a 5 cm del fondo (bajos)
const TRASERA_Z = FONDO - TRASERA;   // cara delantera de la trasera (z = 53)
const NUM_BALDAS = 1;           // nº de baldas del módulo
const FONDO_BALDA = 50;         // fondo de balda por defecto en bajos

// Frentes (y0 = base, alto). `puerta:true` → tirador vertical en el lado de
// apertura (`lado:"izq"|"der"` = lado del tirador). Si no, cajón (tirador horiz.).
// Bajo de PUERTA IZQUIERDA: una sola puerta a todo el alto, tirador a la izquierda.
const FRENTES = [
  { y0:0, alto:ALTO, puerta:true, lado:"izq" }
];

// ── Bisagras de cazoleta (Ø35, codo 0) ───────────────────────────────────────
// Las bisagras van en el lado OPUESTO al tirador. La puerta pivota sobre el eje
// vertical de ese lado (esquina frontal del costado de bisagras).
const HINGE_LADO = (FRENTES[0].lado === "izq") ? "der" : "izq";   // opuesto al tirador
const PIVOT_X = (HINGE_LADO === "der") ? (ANCHO - 0.2) : 0.2;     // canto de la puerta (lado bisagras)
const PIVOT_Z = -EP;                                              // cara frontal de la puerta
const ANGULO_ABIERTO = (HINGE_LADO === "der" ? -1 : 1) * 100 * Math.PI/180;  // ~100°
const CUP_X  = (HINGE_LADO === "der") ? (ANCHO - 0.2 - 2.2) : (0.2 + 2.2);   // centro cazoleta (2,2 cm del canto)
const CUPS_Y = [10, ALTO - 10];   // 2 bisagras: a 10 cm de cada extremo

// Ajuste de la malla REAL de la bisagra (STL de SolidWorks, importado vía Onshape).
// Se afina mirando el visor: escala extra, rotación XYZ (rad) y desplazamiento (cm).
const BISAGRA_SCALE = 1.0;
const BISAGRA_ROT   = [Math.PI/2, -Math.PI/2, 0];
const BISAGRA_OFF   = [0, 0, 3];

const MODELO = {
  nombre: "Bajo puerta izquierda",
  nota: "1 puerta (izq) · 1 balda · 60 × 70 × 58 cm",
  color: "#d6d8db",          // gris claro tipo "vista sombreada" (Rhino)
  canto: "#3a3d42",          // aristas gris oscuro
  elevacion: 15.5,           // altura de patas: el cuerpo se sube esta cota
  // Medidas que se muestran en el panel lateral (etiqueta → valor)
  medidas: [
    ["Alto carcasa",    "70 cm"],
    ["Pata regulable",  "15,5 cm · pie Ø6 · centro a 7,5"],
    ["Ancho",           "60 cm"],
    ["Fondo",           "58 cm"],
    ["Espesor casco",   "1,6 cm"],
    ["Espesor puerta",  "1,9 cm"],
    ["Trasera",         "a 5 cm del fondo"],
    ["Baldas",          "1 · fondo 50 cm"],
    ["Balda apoyo",     "+0,5 cm sobre porta-estante"],
    ["Bisagras",        "cazoleta Ø35 · codo 0 · 2 ud"]
    // (la fila del tirador se añade dinámicamente según tipoTirador)
  ],
  piezas: [
    // ── Caja (60 × 70 × 58, casco espesor 1,6) ────────────
    { nombre:"Costado Izq", pos:[0,           0,        0], size:[EC, ALTO, FONDO] },
    { nombre:"Costado Der", pos:[ANCHO-EC,    0,        0], size:[EC, ALTO, FONDO] },
    { nombre:"Suelo",       pos:[EC,          0,        0], size:[ANCHO-2*EC, EC, FONDO] },
    { nombre:"Techo",       pos:[EC,          ALTO-EC,  0], size:[ANCHO-2*EC, EC, FONDO] },
    // ── Trasera (encajada a 5 cm del fondo) ───────────────
    { nombre:"Trasera",     pos:[EC,          EC,  TRASERA_Z], size:[ANCHO-2*EC, ALTO-2*EC, 0.5] },
    // ── Puerta izquierda (cerrada, sobresale 1,9 cm) ──────
    { nombre:"Puerta", frente:true, mov:true, pos:[0.2, 0, -EP], size:[ANCHO-0.4, ALTO, EP] },
    // ── Baldas (huecos iguales; apoyan +0,5 cm sobre el porta-estante) ──
    ...baldasMueble(NUM_BALDAS, ANCHO, ALTO, FONDO, EC, TRASERA_Z, FONDO_BALDA),
    // ── Patas (redondas regulables) ───────────────────────
    //    (los tiradores se añaden aparte en poblarGrupo, según tipoTirador)
    //    centro a 7,5 cm de cada borde (frente, trasera y laterales)
    ...patasMueble(ANCHO, FONDO, 15.5)
  ]
};

// ── Baldas ───────────────────────────────────────────────────────────────────
// Reparte `num` baldas en huecos IGUALES contando suelo y techo: el interior
// (alto − 2·EC) se divide en num+1 tramos. Cada línea divisoria es la altura del
// PORTA-ESTANTE (mecanización). La balda APOYA 0,5 cm por encima de esa línea
// (cara inferior de la balda en línea+0,5). Ancho = (interior) − 0,3 cm, centrada
// a lo ancho. Fondo por defecto (bajos) = 50 cm, apoyada en la trasera.
function baldasMueble(num, ancho, alto, fondo, ec, traseraZ, fondoBalda){
  const out = [];
  const anchoInt   = ancho - 2*ec;            // hueco entre costados
  const anchoBalda = anchoInt - 0.3;          // 3 mm menos que suelo/techo
  const x0    = ec + (anchoInt - anchoBalda)/2;   // centrada a lo ancho
  const zBalda = traseraZ - fondoBalda;           // apoyada en la trasera
  for (let i = 1; i <= num; i++){
    const yLinea = i * alto / (num + 1);   // división del COSTADO completo (0..alto): huecos iguales
    out.push({ nombre:"Balda", pos:[x0, yLinea + 0.5, zBalda], size:[anchoBalda, ec, fondoBalda] });
  }
  return out;
}

// Cuatro patas niveladoras de cocina (malla STL real); centro a `inset` cm.
// Devuelve marcadores forma:"stl"; la malla se instancia en el bucle de piezas.
// El saliente de la placa (en +X de la malla) se orienta hacia el costado más
// cercano: patas del lado izquierdo giran 180º (saliente hacia -X).
function patasMueble(ancho, fondo, alto, inset = 7.5){
  const out = [];
  const haciaCostado = 1.5;   // acercar cada pata 1,5 cm a su costado
  const bajar = 0.2;          // bajarlas 0,2 cm (penetran un poco menos)
  for (const x of [inset - haciaCostado, ancho - inset + haciaCostado]){
    const rotY = (x < ancho / 2) ? Math.PI : 0;   // izquierda → saliente a -X
    for (const z of [inset, fondo - inset])
      out.push({ nombre:"Pata", forma:"stl", base:true, alto, rotY, pos:[x, -bajar, z], size:[0,0,0] });
  }
  return out;
}

// Cuánto se introduce el remate superior de la pata dentro del suelo del mueble
const PATA_PENETRACION = 1.6;   // ≈ espesor del suelo

// Carga la malla STL de la pata, la orienta (pie abajo) y la normaliza:
// el EJE DEL PIE (no el bounding box, que el saliente descentra) queda en X=Z=0,
// pie apoyado en y=0, escalada uniformemente a `altoObjetivo` cm.
// Devuelve la BufferGeometry lista para clonar, o null si falla la carga.
async function cargarGeoPata(url, altoObjetivo){
  try {
    const geo = await new STLLoader().loadAsync(url);
    geo.computeBoundingBox();
    const b = geo.boundingBox;
    const altoSTL = b.max.y - b.min.y;
    // Centro del PIE (rebanada inferior): el husillo/pie son redondos y marcan el eje
    const pos = geo.attributes.position;
    const yCorte = b.min.y + 0.12 * altoSTL;
    let mnx = 1e9, mxx = -1e9, mnz = 1e9, mxz = -1e9;
    for (let i = 0; i < pos.count; i++){
      if (pos.getY(i) > yCorte) continue;
      const x = pos.getX(i), z = pos.getZ(i);
      if (x < mnx) mnx = x; if (x > mxx) mxx = x;
      if (z < mnz) mnz = z; if (z > mxz) mxz = z;
    }
    const ejeX = (mnx + mxx) / 2;
    const ejeZ = (mnz + mxz) / 2;
    const s = altoObjetivo / altoSTL;            // escala uniforme (no deforma)
    geo.translate(-ejeX, -b.min.y, -ejeZ);       // eje del pie al origen, base en y=0
    geo.scale(s, s, s);
    geo.computeVertexNormals();
    return geo;
  } catch (e) {
    console.warn("No se pudo cargar la pata STL:", e);
    return null;
  }
}

// Carga la bisagra STL real (mm), la pasa a cm y la centra en su bounding box.
// Devuelve la BufferGeometry, o null si no existe (se usará la versión paramétrica).
async function cargarGeoBisagra(url){
  try {
    const geo = await new STLLoader().loadAsync(url);
    geo.scale(0.1, 0.1, 0.1);                          // mm → cm
    geo.computeBoundingBox();
    const c = geo.boundingBox.getCenter(new THREE.Vector3());
    geo.translate(-c.x, -c.y, -c.z);                   // centrada en su centro geométrico
    geo.computeVertexNormals();
    return geo;
  } catch (e) {
    console.warn("No se pudo cargar la bisagra STL:", e);
    return null;
  }
}

// Genera los tiradores de todos los frentes según tipoTirador.
//  · asa:   barra horizontal a 5 cm del borde SUPERIOR de cada frente
//  · uñero: perfil J a todo el ancho, en el borde superior de cada frente
function tiradores(){
  const out = [];
  for (const f of FRENTES){
    const yTop = f.y0 + f.alto;
    if (tipoTirador === "asa")
      out.push(...(f.puerta ? tiradorAsaVert(f) : tiradorAsa(yTop - 5)));
    else
      out.push(...tiradorUnero(yTop));
  }
  return out;
}

// Asa VERTICAL para puerta de BAJO, a 5 cm del borde de apertura (lado del
// tirador) y arriba: primer agujero a 5 cm del borde SUPERIOR, segundo a e/c
// (12,5) por debajo. `f.lado` = "izq"|"der" (lado del tirador).
function tiradorAsaVert(f, entreCentros = 12.5){
  const colM = "#8d9196";
  const yTop = f.y0 + f.alto;
  const ySup = yTop - 5;                                // primer agujero a 5 cm del top
  const yInf = ySup - entreCentros;                     // segundo agujero (e/c 12,5)
  const cx = (f.lado === "der") ? 59.8 - 5 : 0.2 + 5;   // 5 cm del borde de apertura
  const zBarra = -1.9 - 3.5;                            // barra adelantada 3,5 cm sobre la cara
  return [
    { nombre:"Tirador barra",    pos:[cx - 0.6, yInf - 1.0, zBarra], size:[1.2, entreCentros + 2.0, 1.2], color:colM },
    { nombre:"Tirador pata sup", pos:[cx - 0.6, ySup - 0.6, zBarra + 1.2], size:[1.2, 1.2, 2.3], color:colM },
    { nombre:"Tirador pata inf", pos:[cx - 0.6, yInf - 0.6, zBarra + 1.2], size:[1.2, 1.2, 2.3], color:colM }
  ];
}

// Sección en "J" del perfil uñero (plano u=fondo 0..1,6 · v=alto). Base plana
// MACIZA (apoya en todo el top de la puerta, sin huecos a los lados del radio) +
// un único hueco redondo para los dedos; lado dcho alto (pala, al dorso) y lado
// izq bajo (labio, al frente). Se extruye a lo ancho y se rota en el bucle.
function shapeUnero(){
  const Cu = 0.85, Cv = 0.85, Ri = 0.60;   // hueco del dedo: centro (u,v) y radio
  const vBase = 0.10;                       // base plana = top de la puerta
  const sh = new THREE.Shape();
  sh.moveTo(1.60, UNERO_PALA_ALTA);                       // pala dcha (alta), exterior
  sh.lineTo(1.60, vBase);                                 // baja el exterior a la base
  sh.lineTo(0.10, vBase);                                 // base plana
  sh.lineTo(0.10, UNERO_PALA_BAJA);                       // pared izq exterior (más baja)
  sh.absarc(0.175, UNERO_PALA_BAJA, 0.075, Math.PI, 0, false); // labio redondeado izq
  sh.lineTo(0.25, Cv);                                    // pared izq interior
  sh.absarc(Cu, Cv, Ri, Math.PI, 0, false);              // hueco del dedo (semicírculo inf.)
  sh.lineTo(1.45, UNERO_PALA_ALTA);                       // pala dcha interior
  sh.lineTo(1.60, UNERO_PALA_ALTA);                       // cierra el espesor
  return sh;
}

// Perfil uñero de aluminio (falsa gola), a todo el ancho del frente. Devuelve un
// marcador `forma:"unero"`; la sección en J (pala plana + bead redondeado) se
// construye en el bucle de piezas. `yTop` = borde superior nominal del frente.
function tiradorUnero(yTop, ancho = 59.6, x0 = 0.2){
  return [{ nombre:"Uñero", forma:"unero", yTop, ancho, x0, pos:[x0, 0, 0], size:[0, 0, 0] }];
}

// Genera un tirador de asa centrado en X del mueble, a una altura Y dada.
// entreCentros = 12,5 cm (distancia entre agujeros). Color metal gris.
function tiradorAsa(cy, entreCentros = 12.5){
  const colM = "#8d9196";          // gris metal
  const cx = 30;                    // centro X del mueble (ancho 60)
  const h  = entreCentros / 2;      // 6,25
  const zCara = -1.9;               // cara frontal del frente
  const zBarra = zCara - 3.5;       // barra adelantada 3,5 cm
  return [
    // barra horizontal (un poco más larga que la distancia entre centros)
    { nombre:"Tirador barra", pos:[cx - h - 1.0, cy - 0.6, zBarra], size:[entreCentros + 2.0, 1.2, 1.2], color:colM },
    // dos patas hasta la cara del frente, en los puntos de los agujeros
    { nombre:"Tirador pata izq", pos:[cx - h - 0.6, cy - 0.6, zBarra + 1.2], size:[1.2, 1.2, 2.3], color:colM },
    { nombre:"Tirador pata der", pos:[cx + h - 0.6, cy - 0.6, zBarra + 1.2], size:[1.2, 1.2, 2.3], color:colM }
  ];
}

// ── Escena ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

const scene = new THREE.Scene();

// Fondo degradado gris claro (estilo viewport sombreado de Rhino)
(function(){
  const cv = document.createElement('canvas'); cv.width = 2; cv.height = 256;
  const g = cv.getContext('2d').createLinearGradient(0,0,0,256);
  g.addColorStop(0, '#fdfdfe');   // arriba casi blanco
  g.addColorStop(1, '#c7ccd2');   // abajo gris claro
  const ctx = cv.getContext('2d'); ctx.fillStyle = g; ctx.fillRect(0,0,2,256);
  const tex = new THREE.CanvasTexture(cv); tex.colorSpace = THREE.SRGBColorSpace;
  scene.background = tex;
})();

const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 1, 5000);

// Luces neutras y suaves (sombreado uniforme tipo Rhino)
scene.add(new THREE.HemisphereLight(0xffffff, 0xb8bcc2, 1.05));
scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const dir = new THREE.DirectionalLight(0xffffff, 0.65);
dir.position.set(1.0, 1.8, 1.2);
scene.add(dir);
const dir2 = new THREE.DirectionalLight(0xffffff, 0.3);
dir2.position.set(-1.4, 0.8, -1.0);
scene.add(dir2);

// ── Construcción del mueble (reconstruible al alternar el tirador) ───────────
const grupo = new THREE.Group();
scene.add(grupo);
const colTabla = new THREE.Color(MODELO.color || "#caa86b");
const colCanto = new THREE.Color(MODELO.canto || "#5a4a2e");
const elev = MODELO.elevacion || 0;     // las patas suben el cuerpo

// Malla real de la pata (STL) — se clona en cada esquina; null si no carga.
const pataGeo = await cargarGeoPata("pata.stl", (elev || 15.5) + PATA_PENETRACION);
const matPata = new THREE.MeshStandardMaterial({ color:0x34373b, roughness:0.55, metalness:0.25 });
const matAlu  = new THREE.MeshStandardMaterial({ color:0xc8ccd0, roughness:0.35, metalness:0.65 });

// Malla real de la bisagra (STL de SolidWorks vía Onshape); null → usa paramétrica.
const bisagraGeo = await cargarGeoBisagra("bisagra.stl");

let size = new THREE.Vector3();   // dimensiones del conjunto (para encuadrar cámara)
let grid = null;                  // suelo de referencia (se rehace en cada build)

// Puerta animada: subgrupo que pivota sobre el eje de bisagras (las piezas con
// `mov:true` —puerta, tiradores, cazoleta— van dentro; carcasa/pletina, fuera).
let puertaPivot = null;
let anguloPuerta = 0;             // ángulo actual de la puerta (rad)
let anguloObjetivo = 0;           // ángulo destino (0 = cerrada)

// Añade una malla al grupo, opcionalmente con su contorno de aristas (canto).
// Si la geometría ya viene trasladada a su sitio, omitir `pos`.
function addConCanto(geo, mat, pos, conCanto = true, target = grupo){
  const m = new THREE.Mesh(geo, mat);
  if (pos) m.position.copy(pos);
  target.add(m);
  if (conCanto){
    const e = new THREE.LineSegments(new THREE.EdgesGeometry(geo),
      new THREE.LineBasicMaterial({ color: colCanto }));
    if (pos) e.position.copy(pos);
    target.add(e);
  }
}

// Construye las 2 bisagras de cazoleta. Las partes solidarias a la puerta
// (cazoleta + alas + codo) van en `puertaPivot` (restando el pivote `pv`); la
// pletina + brazo + leva quedan fijas en el costado (`grupo`). `pv` = eje de giro.
function construirBisagras(pv){
  const ladoDer = HINGE_LADO === "der";

  // ── Versión con malla REAL (STL) ──
  if (bisagraGeo){
    for (const yc of CUPS_Y){
      const m = new THREE.Mesh(bisagraGeo, matAlu);
      m.scale.setScalar(BISAGRA_SCALE * (ladoDer ? 1 : 1));
      m.rotation.set(BISAGRA_ROT[0], BISAGRA_ROT[1], BISAGRA_ROT[2]);
      m.position.set(CUP_X + BISAGRA_OFF[0] - pv.x, yc + elev + BISAGRA_OFF[1], BISAGRA_OFF[2] - pv.z);
      puertaPivot.add(m);   // la bisagra completa acompaña a la puerta
    }
    return;
  }

  // ── Versión paramétrica (si no hay STL) ──
  const plX = ladoDer ? (ANCHO - EC - 0.3) : (EC + 0.3);   // pletina contra cara interior del costado
  const codoX = CUP_X + (ladoDer ? 0.3 : -0.3);
  for (const yc of CUPS_Y){
    const yE = yc + elev;
    // ── Solidario a la puerta (pivota) ──
    const cup = new THREE.Mesh(new THREE.CylinderGeometry(1.75, 1.75, 1.2, 28), matAlu);
    cup.rotation.x = Math.PI/2;                              // eje de la cazoleta → Z
    cup.position.set(CUP_X - pv.x, yE, -0.6 - pv.z);        // embebida en la puerta (z 0..-1,2)
    puertaPivot.add(cup);
    for (const dy of [-2.8, 2.8]){                          // 2 alas con tornillo
      const ala = new THREE.Mesh(new THREE.BoxGeometry(2.6, 1.0, 0.4), matAlu);
      ala.position.set(CUP_X - pv.x, yE + dy, -0.2 - pv.z);
      puertaPivot.add(ala);
    }
    const codo = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, 1.8), matAlu);
    codo.position.set(codoX - pv.x, yE, 0.9 - pv.z);        // codo que sale hacia el interior
    puertaPivot.add(codo);
    // ── Fijo en el costado ──
    const pletina = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.6, 5.0), matAlu);
    pletina.position.set(plX, yE, 3.2);
    grupo.add(pletina);
    const brazo = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, 3.4), matAlu);
    brazo.position.set((codoX + plX)/2, yE, 1.7);
    grupo.add(brazo);
    const leva = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.6, 16), matAlu);
    leva.position.set((codoX + plX)/2, yE + 0.9, 2.6);
    grupo.add(leva);
  }
}

// (Re)construye el mueble: piezas fijas + tiradores del tipo activo.
function poblarGrupo(){
  grupo.traverse(o => {                          // liberar geometrías (salvo la pata compartida)
    if (o.geometry && o.geometry !== pataGeo) o.geometry.dispose();
  });
  grupo.clear();
  grupo.position.set(0,0,0);

  // Subgrupo que pivota sobre el eje de bisagras; las piezas `mov:true` van dentro.
  puertaPivot = new THREE.Group();
  puertaPivot.position.set(PIVOT_X, 0, PIVOT_Z);
  grupo.add(puertaPivot);
  const pv = new THREE.Vector3(PIVOT_X, 0, PIVOT_Z);   // pivote a restar a las piezas móviles

  // Con la puerta oculta: se omiten frentes y sus tiradores (la balda sí se ve).
  const piezas  = puertaVisible ? MODELO.piezas : MODELO.piezas.filter(p => !p.frente);
  const tiros   = puertaVisible ? tiradores() : [];
  tiros.forEach(t => t.mov = true);              // los tiradores van con la puerta
  for (const p of [...piezas, ...tiros]){
    const [sx,sy,sz] = p.size;
    const [px,py,pz] = p.pos;
    const oy = p.base ? 0 : elev;          // base:true (patas) no se elevan
    const mov = p.mov === true;            // ¿solidario a la puerta?
    const tgt = mov ? puertaPivot : grupo; // grupo destino

    // ── Pata: instancia de la malla STL (apoyada en y=0, centrada en su pos) ──
    if (p.forma === "stl"){
      if (pataGeo){
        const m = new THREE.Mesh(pataGeo, matPata);
        m.rotation.y = p.rotY || 0;        // saliente hacia el costado más cercano
        m.position.set(px, py, pz);        // eje del pie en (px,pz); py = bajada
        grupo.add(m);
      } else {                              // fallback: cilindro simple
        const h = p.alto || 15.5;
        const fm = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 2.5, h, 20), matPata);
        fm.position.set(px, h/2, pz);
        grupo.add(fm);
      }
      continue;
    }

    // ── Perfil uñero: sección en "J" (shapeUnero) extruida a todo el ancho ──
    // Bajado JUNTA_FRENTE para que frente+uñero remate a la misma altura que con asa.
    if (p.forma === "unero"){
      const yBase = p.yTop - UNERO_ALTO - JUNTA_FRENTE;
      const geo = new THREE.ExtrudeGeometry(shapeUnero(),
        { depth: p.ancho, bevelEnabled:false, steps:1, curveSegments:16 });
      geo.rotateY(-Math.PI/2);                                // extrusión (z) → ancho (x)
      geo.translate(p.x0 + p.ancho, oy + yBase - 0.8, -1.6);  // pala al dorso del frente (z=0)
      if (mov) geo.translate(-pv.x, 0, -pv.z);
      tgt.add(new THREE.Mesh(geo, matAlu));
      // espiga oculta dentro de la puerta (1 mm más corta por lado: no asoma de lado)
      const sm = new THREE.Mesh(new THREE.BoxGeometry(p.ancho - 0.2, 1.6, 0.4), matAlu);
      sm.position.set(p.x0 + p.ancho/2 - (mov?pv.x:0), oy + yBase - 1.4, -0.75 - (mov?pv.z:0));
      tgt.add(sm);
      continue;
    }

    // ── Frente con uñero: UNA pieza, sección en L (delante alto · detrás bajo) ──
    // La franja delantera (cara vista) sube; la trasera baja UNERO_RECORTE para la gola.
    if (p.frente && tipoTirador === "unero"){
      const fDel = Math.min(UNERO_FRENTE_DELANTE, sz);
      const altoTras = sy - UNERO_RECORTE;
      const altoDel = altoTras + UNERO_FRENTE_SALIENTE;
      const sh = new THREE.Shape();
      sh.moveTo(0, 0); sh.lineTo(sz, 0); sh.lineTo(sz, altoTras);
      sh.lineTo(fDel, altoTras); sh.lineTo(fDel, altoDel); sh.lineTo(0, altoDel); sh.lineTo(0, 0);
      const g = new THREE.ExtrudeGeometry(sh, { depth: sx, bevelEnabled:false, steps:1 });
      g.rotateY(-Math.PI/2);              // extrusión (z) → ancho (x)
      g.translate(px + sx, oy + py, pz);  // a→z desde pz · b→y desde oy+py
      if (mov) g.translate(-pv.x, 0, -pv.z);
      addConCanto(g, new THREE.MeshStandardMaterial({
        color: p.color ? new THREE.Color(p.color) : colTabla, roughness:0.95 }), null, true, tgt);
      continue;
    }

    // ── Resto: cajas, frentes con asa, cilindros/conos ──
    const sy2 = p.frente ? sy - JUNTA_FRENTE : sy;   // frente: holgura anclada abajo
    const geo = (p.forma === "cilindro")
      ? new THREE.CylinderGeometry(p.rTop ?? sx/2, p.rBot ?? sx/2, sy, p.seg ?? 24) // rTop/rBot → cono
      : new THREE.BoxGeometry(sx, sy2, sz);
    const mat = new THREE.MeshStandardMaterial({
      color: p.color ? new THREE.Color(p.color) : colTabla,
      roughness: p.rough ?? 0.95, metalness: p.metal ?? 0.0 });
    const c = new THREE.Vector3(px + sx/2, oy + py + sy2/2, pz + sz/2);
    if (mov) c.sub(pv);
    addConCanto(geo, mat, c, !p.sinCanto, tgt);
  }

  // Bisagras de cazoleta (solo con la puerta presente)
  if (puertaVisible) construirBisagras(pv);
  puertaPivot.rotation.y = anguloPuerta;          // mantiene el ángulo actual al reconstruir

  // Centrar el conjunto en el origen y (re)colocar el suelo de referencia
  const box = new THREE.Box3().setFromObject(grupo);
  size = box.getSize(new THREE.Vector3());
  grupo.position.sub(box.getCenter(new THREE.Vector3()));   // centro del mueble en (0,0,0)
  if (grid) scene.remove(grid);
  grid = new THREE.GridHelper(Math.max(size.x, size.z)*3, 24, 0xb4b9c0, 0xd2d6dc);
  grid.position.y = -size.y/2 - 0.1;
  scene.add(grid);
}
poblarGrupo();

// Cámara: vista 3/4 tipo catálogo (frente + costado derecho, ligera elevación).
// Frentes hacia -Z; diagonal ~30° en horizontal y ~18° de picado.
const radio = Math.max(size.x, size.y, size.z);
camera.position.set(radio*0.85, radio*0.55, -radio*1.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0,0,0);
controls.minDistance = radio*0.6;
controls.maxDistance = radio*6;
controls.update();

// Texto
document.getElementById('info').textContent = MODELO.nombre || "Mueble";
document.getElementById('sub').textContent  = MODELO.nota || "";

// Panel de medidas (incluye la fila del tirador según el tipo activo)
function actualizarMedidas(){
  const cont = document.getElementById('medidas');
  const base = MODELO.medidas || [];
  const filaTirador = (tipoTirador === "asa")
    ? ["Tirador (asa)",   "12,5 cm e/c"]
    : ["Tirador (uñero)", "perfil falsa gola"];
  let html = '<h3>Medidas</h3><table>';
  for (const [k,v] of [...base, filaTirador])
    html += '<tr><td class="k">'+k+'</td><td class="v">'+v+'</td></tr>';
  cont.innerHTML = html + '</table>';
}
actualizarMedidas();

// Botón: alterna asa ⇄ uñero y reconstruye la escena entera
const btnTirador = document.getElementById('btnTirador');
function actualizarBoton(){
  btnTirador.textContent = (tipoTirador === "unero") ? "Tirador: uñero" : "Tirador: asa";
}
btnTirador.addEventListener('click', () => {
  tipoTirador = (tipoTirador === "unero") ? "asa" : "unero";
  poblarGrupo();
  actualizarMedidas();
  actualizarBoton();
});
actualizarBoton();

// Botón: muestra/oculta la(s) puerta(s) y reconstruye la escena
const btnPuerta = document.getElementById('btnPuerta');
function actualizarBotonPuerta(){
  btnPuerta.textContent = puertaVisible ? "Puerta: visible" : "Puerta: oculta";
}
btnPuerta.addEventListener('click', () => {
  puertaVisible = !puertaVisible;
  poblarGrupo();
  actualizarBotonPuerta();
});
actualizarBotonPuerta();

// Botón: anima la puerta abrir ⇄ cerrar (girando sobre el eje de bisagras)
const btnAbrir = document.getElementById('btnAbrir');
let abierta = false;
function actualizarBotonAbrir(){
  btnAbrir.textContent = abierta ? "Cerrar puerta" : "Abrir puerta";
}
btnAbrir.addEventListener('click', () => {
  if (!puertaVisible){ puertaVisible = true; poblarGrupo(); actualizarBotonPuerta(); }
  abierta = !abierta;
  anguloObjetivo = abierta ? ANGULO_ABIERTO : 0;
  actualizarBotonAbrir();
});
actualizarBotonAbrir();

// Resize
function resize(){
  renderer.setSize(innerWidth, innerHeight, false);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

// Loop
(function animate(){
  requestAnimationFrame(animate);
  // Suaviza la puerta hacia su ángulo objetivo (abrir/cerrar)
  if (puertaPivot && Math.abs(anguloObjetivo - anguloPuerta) > 1e-4){
    anguloPuerta += (anguloObjetivo - anguloPuerta) * 0.14;
    puertaPivot.rotation.y = anguloPuerta;
  }
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
