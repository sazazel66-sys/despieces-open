<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Visor 3D — Despieces Presenti</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#d5d9df;font-family:system-ui,sans-serif;-webkit-user-select:none;user-select:none}
  #c{display:block;width:100vw;height:100vh;touch-action:none}
  #info{position:fixed;top:10px;left:12px;color:#334;font-size:14px;font-weight:600;z-index:5;text-shadow:0 1px 2px #fff}
  #sub{position:fixed;top:30px;left:12px;color:#778;font-size:12px;z-index:5}
  #hint{position:fixed;bottom:10px;left:0;right:0;text-align:center;color:#889;font-size:12px;z-index:5}
  /* Panel de medidas (lado derecho) */
  #medidas{position:fixed;top:8px;right:8px;z-index:6;background:rgba(255,255,255,.88);
           border:1px solid #d4d9e0;border-radius:8px;padding:6px 8px;
           box-shadow:0 1px 6px rgba(40,50,70,.12);backdrop-filter:blur(2px)}
  #medidas h3{margin:0 0 3px;font-size:9px;letter-spacing:.04em;text-transform:uppercase;color:#667}
  #medidas table{border-collapse:collapse;font-size:10px;color:#334;line-height:1.25}
  #medidas td{padding:1px 0}
  #medidas td.k{color:#889;padding-right:10px;white-space:nowrap}
  #medidas td.v{font-weight:600;text-align:right;white-space:nowrap}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="info">—</div>
<div id="sub"></div>
<div id="medidas"></div>
<div id="hint">Arrastra para girar · pellizca para zoom · dos dedos para mover</div>
<canvas id="c"></canvas>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

// ───────────────────────────────────────────────────────────────────────────
//  MODELO DEL MUEBLE  (cm:  X = anchura,  Y = altura,  Z = fondo)
//  pos = esquina mínima [x,y,z]   ·   size = [ancho, alto, fondo]
//  Vamos sobrescribiendo este objeto a medida que añadimos piezas.
// ───────────────────────────────────────────────────────────────────────────
const MODELO = {
  nombre: "Bajo cajones",
  nota: "1 cajón pequeño (14) + 2 grandes (28) · 60 × 70 × 58 cm",
  color: "#d6d8db",          // gris claro tipo "vista sombreada" (Rhino)
  canto: "#3a3d42",          // aristas gris oscuro
  elevacion: 15.5,           // altura de patas: el cuerpo se sube esta cota
  // Medidas que se muestran en el panel lateral (etiqueta → valor)
  medidas: [
    ["Alto carcasa",    "70 cm"],
    ["Pata regulable",  "15,5 cm · pie Ø6 · centro a 7,5"],
    ["Ancho",           "60 cm"],
    ["Fondo",           "58 cm"],
    ["Espesor casco",   "1,6 cm"],
    ["Espesor puerta",  "1,9 cm"],
    ["Trasera",         "a 5 cm del fondo"],
    ["Frente pequeño",  "14 cm"],
    ["Frentes grandes", "28 cm × 2"],
    ["Tirador (asa)",   "12,5 cm e/c"]
  ],
  piezas: [
    // ── Caja (60 × 70 × 58, casco espesor 1,6) ────────────
    { nombre:"Costado Izq", pos:[0,    0,    0], size:[1.6, 70, 58] },
    { nombre:"Costado Der", pos:[58.4, 0,    0], size:[1.6, 70, 58] },
    { nombre:"Suelo",       pos:[1.6,  0,    0], size:[56.8, 1.6, 58] },
    { nombre:"Techo",       pos:[1.6,  68.4, 0], size:[56.8, 1.6, 58] },
    // ── Trasera (encajada a 5 cm del fondo) ───────────────
    { nombre:"Trasera",     pos:[1.6,  1.6,  53], size:[56.8, 66.8, 0.5] },
    // ── Frentes de cajones (cerrados, sobresalen 1,9 cm) ──
    //    de abajo arriba: grande 28 · grande 28 · pequeño 14
    { nombre:"Frente cajón grande inferior", frente:true, pos:[0.2, 0,  -1.9], size:[59.6, 28, 1.9] },
    { nombre:"Frente cajón grande medio",    frente:true, pos:[0.2, 28, -1.9], size:[59.6, 28, 1.9] },
    { nombre:"Frente cajón pequeño",         frente:true, pos:[0.2, 56, -1.9], size:[59.6, 14, 1.9] },
    // ── Tiradores tipo asa (12,5 cm entre centros) ────────
    //    centrados en X (mueble 60 → centro 30; agujeros a 30 ± 6,25)
    //    barra a 3,5 cm de la cara del frente (cara frontal en z = -1,9)
    ...tiradorAsa(14),   // frente grande inferior  (centro Y = 14)
    ...tiradorAsa(42),   // frente grande medio     (centro Y = 42)
    ...tiradorAsa(63),   // frente pequeño          (centro Y = 63)
    // ── Patas (redondas regulables) ───────────────────────
    //    centro a 7,5 cm de cada borde (frente, trasera y laterales)
    ...patasMueble(60, 58, 15.5)
  ]
};

// Cuatro patas niveladoras de cocina (malla STL real); centro a `inset` cm.
// Devuelve marcadores forma:"stl"; la malla se instancia en el bucle de piezas.
// El saliente de la placa (en +X de la malla) se orienta hacia el costado más
// cercano: patas del lado izquierdo giran 180º (saliente hacia -X).
function patasMueble(ancho, fondo, alto, inset = 7.5){
  const out = [];
  const haciaCostado = 1.5;   // acercar cada pata 1,5 cm a su costado
  const bajar = 0.2;          // bajarlas 0,2 cm (penetran un poco menos)
  for (const x of [inset - haciaCostado, ancho - inset + haciaCostado]){
    const rotY = (x < ancho / 2) ? Math.PI : 0;   // izquierda → saliente a -X
    for (const z of [inset, fondo - inset])
      out.push({ nombre:"Pata", forma:"stl", base:true, alto, rotY, pos:[x, -bajar, z], size:[0,0,0] });
  }
  return out;
}

// Cuánto se introduce el remate superior de la pata dentro del suelo del mueble
const PATA_PENETRACION = 1.6;   // ≈ espesor del suelo

// Junta de holgura de TODO frente/puerta: tras hallar su tamaño y posición, se
// descuenta de ALTO, anclando la parte baja (la cara inferior no se mueve).
const JUNTA_FRENTE = 0.2;

// Carga la malla STL de la pata, la orienta (pie abajo) y la normaliza:
// el EJE DEL PIE (no el bounding box, que el saliente descentra) queda en X=Z=0,
// pie apoyado en y=0, escalada uniformemente a `altoObjetivo` cm.
// Devuelve la BufferGeometry lista para clonar, o null si falla la carga.
async function cargarGeoPata(url, altoObjetivo){
  try {
    const geo = await new STLLoader().loadAsync(url);
    geo.computeBoundingBox();
    const b = geo.boundingBox;
    const altoSTL = b.max.y - b.min.y;
    // Centro del PIE (rebanada inferior): el husillo/pie son redondos y marcan el eje
    const pos = geo.attributes.position;
    const yCorte = b.min.y + 0.12 * altoSTL;
    let mnx = 1e9, mxx = -1e9, mnz = 1e9, mxz = -1e9;
    for (let i = 0; i < pos.count; i++){
      if (pos.getY(i) > yCorte) continue;
      const x = pos.getX(i), z = pos.getZ(i);
      if (x < mnx) mnx = x; if (x > mxx) mxx = x;
      if (z < mnz) mnz = z; if (z > mxz) mxz = z;
    }
    const ejeX = (mnx + mxx) / 2;
    const ejeZ = (mnz + mxz) / 2;
    const s = altoObjetivo / altoSTL;            // escala uniforme (no deforma)
    geo.translate(-ejeX, -b.min.y, -ejeZ);       // eje del pie al origen, base en y=0
    geo.scale(s, s, s);
    geo.computeVertexNormals();
    return geo;
  } catch (e) {
    console.warn("No se pudo cargar la pata STL:", e);
    return null;
  }
}

// Genera un tirador de asa centrado en X del mueble, a una altura Y dada.
// entreCentros = 12,5 cm (distancia entre agujeros). Color metal gris.
function tiradorAsa(cy, entreCentros = 12.5){
  const colM = "#8d9196";          // gris metal
  const cx = 30;                    // centro X del mueble (ancho 60)
  const h  = entreCentros / 2;      // 6,25
  const zCara = -1.9;               // cara frontal del frente
  const zBarra = zCara - 3.5;       // barra adelantada 3,5 cm
  return [
    // barra horizontal (un poco más larga que la distancia entre centros)
    { nombre:"Tirador barra", pos:[cx - h - 1.0, cy - 0.6, zBarra], size:[entreCentros + 2.0, 1.2, 1.2], color:colM },
    // dos patas hasta la cara del frente, en los puntos de los agujeros
    { nombre:"Tirador pata izq", pos:[cx - h - 0.6, cy - 0.6, zBarra + 1.2], size:[1.2, 1.2, 2.3], color:colM },
    { nombre:"Tirador pata der", pos:[cx + h - 0.6, cy - 0.6, zBarra + 1.2], size:[1.2, 1.2, 2.3], color:colM }
  ];
}

// ── Escena ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));

const scene = new THREE.Scene();

// Fondo degradado gris claro (estilo viewport sombreado de Rhino)
(function(){
  const cv = document.createElement('canvas'); cv.width = 2; cv.height = 256;
  const g = cv.getContext('2d').createLinearGradient(0,0,0,256);
  g.addColorStop(0, '#fdfdfe');   // arriba casi blanco
  g.addColorStop(1, '#c7ccd2');   // abajo gris claro
  const ctx = cv.getContext('2d'); ctx.fillStyle = g; ctx.fillRect(0,0,2,256);
  const tex = new THREE.CanvasTexture(cv); tex.colorSpace = THREE.SRGBColorSpace;
  scene.background = tex;
})();

const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 1, 5000);

// Luces neutras y suaves (sombreado uniforme tipo Rhino)
scene.add(new THREE.HemisphereLight(0xffffff, 0xb8bcc2, 1.05));
scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const dir = new THREE.DirectionalLight(0xffffff, 0.65);
dir.position.set(1.0, 1.8, 1.2);
scene.add(dir);
const dir2 = new THREE.DirectionalLight(0xffffff, 0.3);
dir2.position.set(-1.4, 0.8, -1.0);
scene.add(dir2);

// Construir piezas
const grupo = new THREE.Group();
const colTabla = new THREE.Color(MODELO.color || "#caa86b");
const colCanto = new THREE.Color(MODELO.canto || "#5a4a2e");

const elev = MODELO.elevacion || 0;     // las patas suben el cuerpo

// Malla real de la pata (STL) — se clona en cada esquina; null si no carga.
// Se escala un poco más alta (penetración) para que el remate entre en el suelo.
const pataGeo = await cargarGeoPata("pata.stl", (elev || 15.5) + PATA_PENETRACION);
const matPata = new THREE.MeshStandardMaterial({ color:0x34373b, roughness:0.55, metalness:0.25 });

for (const p of MODELO.piezas){
  const [sx,sy,sz] = p.size;
  const [px,py,pz] = p.pos;
  const oy = p.base ? 0 : elev;          // base:true (patas) no se elevan

  // ── Pata: instancia de la malla STL (apoyada en y=0, centrada en su pos) ──
  if (p.forma === "stl"){
    if (pataGeo){
      const m = new THREE.Mesh(pataGeo, matPata);
      m.rotation.y = p.rotY || 0;        // saliente hacia el costado más cercano
      m.position.set(px, py, pz);        // eje del pie en (px,pz); py = bajada
      grupo.add(m);
    } else {                              // fallback: cilindro simple
      const d = 5, h = p.alto || 15.5;
      const fg = new THREE.CylinderGeometry(d/2, d/2, h, 20);
      const fm = new THREE.Mesh(fg, matPata);
      fm.position.set(px, h/2, pz);
      grupo.add(fm);
    }
    continue;
  }

  // Frente/puerta: descuento de junta en alto, anclado abajo (pos.y intacta)
  const sy2 = p.frente ? sy - JUNTA_FRENTE : sy;
  const geo = (p.forma === "cilindro")
    ? new THREE.CylinderGeometry(p.rTop ?? sx/2, p.rBot ?? sx/2, sy, p.seg ?? 24)  // eje Y; rTop/rBot → cono
    : new THREE.BoxGeometry(sx, sy2, sz);
  const mat = new THREE.MeshStandardMaterial({
    color: p.color ? new THREE.Color(p.color) : colTabla,
    roughness: p.rough ?? 0.95, metalness: p.metal ?? 0.0
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(px + sx/2, oy + py + sy2/2, pz + sz/2);   // pos = esquina mínima (anclado abajo)
  grupo.add(mesh);
  // aristas (aspecto de tablero) — se omiten en piezas torneadas pequeñas (sinCanto)
  if (!p.sinCanto){
    const edges = new THREE.LineSegments(
      new THREE.EdgesGeometry(geo),
      new THREE.LineBasicMaterial({ color: colCanto })
    );
    edges.position.copy(mesh.position);
    grupo.add(edges);
  }
}
scene.add(grupo);

// Centrar el grupo en el origen y encuadrar cámara
const box = new THREE.Box3().setFromObject(grupo);
const size = box.getSize(new THREE.Vector3());
const center = box.getCenter(new THREE.Vector3());
grupo.position.sub(center);                 // centro del mueble en (0,0,0)

// Suelo de referencia
const grid = new THREE.GridHelper(Math.max(size.x,size.z)*3, 24, 0xb4b9c0, 0xd2d6dc);
grid.position.y = -size.y/2 - 0.1;
scene.add(grid);

// Cámara: vista frontal-superior-derecha (frentes hacia el espectador, en -Z)
const radio = Math.max(size.x, size.y, size.z);
camera.position.set(radio*1.0, radio*0.85, -radio*1.8);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0,0,0);
controls.minDistance = radio*0.6;
controls.maxDistance = radio*6;
controls.update();

// Texto
document.getElementById('info').textContent = MODELO.nombre || "Mueble";
document.getElementById('sub').textContent  = MODELO.nota || "";

// Panel de medidas
(function(){
  const cont = document.getElementById('medidas');
  if (!MODELO.medidas || !MODELO.medidas.length){ cont.style.display='none'; return; }
  let html = '<h3>Medidas</h3><table>';
  for (const [k,v] of MODELO.medidas){
    html += '<tr><td class="k">'+k+'</td><td class="v">'+v+'</td></tr>';
  }
  html += '</table>';
  cont.innerHTML = html;
})();

// Resize
function resize(){
  renderer.setSize(innerWidth, innerHeight, false);
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

// Loop
(function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
